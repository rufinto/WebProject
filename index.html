<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dépôt de messages</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Dépôt de Messages</h1>
    </header>

    <main>
      <section aria-labelledby="messages-title">
        <h2 id="messages-title">Messages</h2>
        <ul id="messages">
          <li>Message 1 : Bonjour !</li>
          <li>Message 2 : Comment ca va ?</li>
          <li>Message 3 : Ceci est un exemple.</li>
          <li>Message 4 : Dernier detail avant le JS.</li>
          <li>Message 5 : A vous de jouer !</li>
        </ul>
      </section>

      <section aria-labelledby="poster-title">
        <h2 id="poster-title">Poster un message</h2>
        <form id="messageForm">
          <label for="messageInput">Votre message</label>
          <input id="messageInput" name="message" type="text" />
          <button id="sendButton" type="submit">Envoyer</button>
        </form>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
