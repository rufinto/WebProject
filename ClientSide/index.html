<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dépôt de messages</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Dépôt de Messages</h1>
    </header>

    <main>
      <section aria-labelledby="messages-title">
        <h2 id="messages-title">Messages</h2>
        <p id="loadError" class="load-error" hidden></p>
        <ul id="messages"></ul>
      </section>

      <section aria-labelledby="poster-title">
        <h2 id="poster-title">Poster un message</h2>
        <form id="messageForm">
          <label for="apiBase">URL du micro-service (optionnel)</label>
          <input
            id="apiBase"
            name="apiBase"
            type="url"
            placeholder="Vide = même origine (ex. http://localhost:8080)"
          />
          <label for="pseudoInput">Pseudo</label>
          <input
            id="pseudoInput"
            name="pseudo"
            type="text"
            placeholder="Anonyme"
            autocomplete="nickname"
          />
          <label for="messageInput">Votre message</label>
          <input id="messageInput" name="message" type="text" required />
          <button id="sendButton" type="submit">Envoyer</button>
        </form>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
